<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 Malaysia Stock Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.0.0/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .header {
            background: linear-gradient(90deg, #0f3460 0%, #16213e 100%);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .header h1 {
            font-size: 24px;
            color: #00d4ff;
        }
        
        .header .refresh-btn {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .header .refresh-btn:hover {
            background: #00a8cc;
            transform: scale(1.05);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: transparent;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }
        
        .tab-btn:hover {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }
        
        .tab-btn.active {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        /* KLCI Index Tab */
        .klci-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .klci-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            flex: 1;
            min-width: 200px;
        }
        
        .klci-card.main {
            background: linear-gradient(145deg, #0f3460, #16213e);
            border: 2px solid #00d4ff;
        }
        
        .klci-label {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .klci-value {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .klci-change {
            font-size: 18px;
            margin-top: 5px;
        }
        
        .klci-change.positive { color: #00ff88; }
        .klci-change.negative { color: #ff4444; }
        
        /* Sector Tabs */
        .sector-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .sector-btn {
            padding: 10px 16px;
            border: 2px solid #333;
            background: rgba(255,255,255,0.05);
            color: #aaa;
            font-size: 13px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .sector-btn:hover {
            border-color: #555;
            background: rgba(255,255,255,0.1);
        }
        
        .sector-btn.active {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.2);
            color: #fff;
        }
        
        .sector-btn .count {
            font-size: 11px;
            background: rgba(255,255,255,0.2);
            padding: 2px 6px;
            border-radius: 10px;
        }
        
        .sector-btn.up .count { background: rgba(0,255,136,0.3); }
        .sector-btn.down .count { background: rgba(255,68,68,0.3); }
        
        /* Stock Table */
        .stock-table-container {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .stock-table th {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            text-align: left;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: sticky;
            top: 0;
        }
        
        .stock-table td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .stock-table tr:hover {
            background: rgba(0,212,255,0.1);
            cursor: pointer;
        }
        
        .stock-table tr.sector-header {
            background: rgba(255,255,255,0.1);
        }
        
        .stock-table tr.sector-header td {
            font-weight: bold;
            color: #00d4ff;
            padding: 10px 15px;
        }
        
        .stock-name-cell {
            display: flex;
            flex-direction: column;
        }
        
        .stock-name {
            font-weight: 600;
            color: #fff;
        }
        
        .stock-ticker {
            font-size: 12px;
            color: #666;
        }
        
        .stock-sector {
            font-size: 11px;
            color: #00d4ff;
            background: rgba(0,212,255,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 4px;
        }
        
        .price-cell {
            font-weight: 600;
            font-size: 16px;
        }
        
        .change-cell {
            font-weight: 600;
        }
        
        .change-cell.positive { color: #00ff88; }
        .change-cell.negative { color: #ff4444; }
        
        .change-bar {
            width: 60px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        .change-bar-fill {
            height: 100%;
            border-radius: 3px;
        }
        
        .change-bar-fill.positive { background: #00ff88; }
        .change-bar-fill.negative { background: #ff4444; }
        
        /* Sector Summary Bar */
        .sector-summary {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .sector-pill {
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
        }
        
        .sector-pill.up {
            border-color: #00ff88;
            background: rgba(0,255,136,0.1);
        }
        
        .sector-pill.down {
            border-color: #ff4444;
            background: rgba(255,68,68,0.1);
        }
        
        .sector-pill .icon { font-size: 16px; }
        .sector-pill .name { color: #aaa; }
        .sector-pill .change { font-weight: 600; }
        
        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        select, .timeframe-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #0f3460;
            background: #16213e;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        select:hover, .timeframe-btn:hover {
            border-color: #00d4ff;
        }
        
        select:focus, .timeframe-btn:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .timeframe-btn.active {
            background: #00d4ff;
            color: #1a1a2e;
            border-color: #00d4ff;
        }
        
        .price-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .price-display {
            display: flex;
            align-items: baseline;
            gap: 20px;
            margin-bottom: 10px;
        }
        
        .current-price {
            font-size: 48px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .price-change {
            font-size: 20px;
            padding: 8px 16px;
            border-radius: 8px;
        }
        
        .price-change.positive {
            background: rgba(0, 255, 0, 0.2);
            color: #00ff88;
        }
        
        .price-change.negative {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
        }
        
        .stock-name-display {
            font-size: 18px;
            color: #888;
            margin-bottom: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        
        .stat-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }
        
        .stat-label {
            font-size: 12px;
            color: #888;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 18px;
            font-weight: bold;
        }
        
        .chart-container {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .chart-title {
            font-size: 18px;
            color: #00d4ff;
        }
        
        #chart {
            width: 100%;
            height: 400px;
        }
        
        .indicators-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .indicator-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        
        .indicator-title {
            font-size: 16px;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .indicator-value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .indicator-value.positive { color: #00ff88; }
        .indicator-value.negative { color: #ff4444; }
        .indicator-value.neutral { color: #ffaa00; }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #00d4ff;
        }
        
        .error {
            background: rgba(255,0,0,0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }
        
        .auto-refresh label {
            color: #888;
            font-size: 14px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #00ff88;
            font-size: 14px;
        }
        
        .live-dot {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            
            .klci-header {
                flex-direction: column;
            }
            
            .stock-table {
                font-size: 14px;
            }
            
            .stock-table th, .stock-table td {
                padding: 10px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📈 Malaysia Stock Dashboard</h1>
        <div class="auto-refresh">
            <span class="live-indicator">
                <span class="live-dot"></span>
                LIVE
            </span>
            <label>
                <input type="checkbox" id="autoRefresh" checked> Auto-refresh
            </label>
            <button class="refresh-btn" onclick="refreshAll()">🔄 Refresh</button>
        </div>
    </div>
    
    <div class="container">
        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('klci')">🇲🇾 KLCI Index</button>
            <button class="tab-btn" onclick="switchTab('stocks')">📈 Stocks</button>
        </div>
        
        <!-- KLCI Index Tab -->
        <div id="klci-tab" class="tab-content active">
            <!-- KLCI Header Cards -->
            <div class="klci-header" id="klciHeader">
                <div class="loading">Loading KLCI data...</div>
            </div>
            
            <!-- Sector Pills Summary -->
            <div class="sector-summary" id="sectorSummary"></div>
            
            <!-- Sector Tabs -->
            <div class="sector-tabs" id="sectorTabs">
                <button class="sector-btn active" onclick="selectSector('all')">
                    📊 All <span class="count" id="count-all">--</span>
                </button>
            </div>
            
            <!-- Stock Table -->
            <div class="stock-table-container">
                <table class="stock-table" id="klciTable">
                    <thead>
                        <tr>
                            <th>Stock</th>
                            <th>Price</th>
                            <th>Change</th>
                            <th>% Change</th>
                            <th>Volume</th>
                        </tr>
                    </thead>
                    <tbody id="klciTableBody">
                        <tr><td colspan="5" class="loading">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Stocks Tab -->
        <div id="stocks-tab" class="tab-content">
            <!-- Controls -->
            <div class="controls">
                <select id="stockSelect" onchange="loadStock()">
                    <option value="">-- Select Stock --</option>
                </select>
                <button class="timeframe-btn active" onclick="setTimeframe('1D')" data-tf="1D">1D</button>
                <button class="timeframe-btn" onclick="setTimeframe('1W')" data-tf="1W">1W</button>
                <button class="timeframe-btn" onclick="setTimeframe('1MO')" data-tf="1MO">1M</button>
                <button class="timeframe-btn" onclick="setTimeframe('3MO')" data-tf="3MO">3M</button>
                <button class="timeframe-btn" onclick="setTimeframe('6MO')" data-tf="6MO">6M</button>
                <button class="timeframe-btn" onclick="setTimeframe('1Y')" data-tf="1Y">1Y</button>
                <button class="timeframe-btn" onclick="setTimeframe('5Y')" data-tf="5Y">5Y</button>
            </div>
            
            <!-- Price Card -->
            <div class="price-card" id="priceCard" style="display: none;">
                <div class="stock-name-display" id="stockName">--</div>
                <div class="price-display">
                    <div class="current-price" id="currentPrice">--</div>
                    <div class="price-change positive" id="priceChange">--</div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">Previous Close</div>
                        <div class="stat-value" id="prevClose">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Day High</div>
                        <div class="stat-value" id="dayHigh">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Day Low</div>
                        <div class="stat-value" id="dayLow">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">52W High</div>
                        <div class="stat-value" id="week52High">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">52W Low</div>
                        <div class="stat-value" id="week52Low">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Volume</div>
                        <div class="stat-value" id="volume">--</div>
                    </div>
                </div>
            </div>
            
            <!-- Main Chart -->
            <div class="chart-container" id="chartContainer" style="display: none;">
                <div class="chart-header">
                    <div class="chart-title">Price Chart</div>
                </div>
                <div id="chart"></div>
            </div>
            
            <!-- Technical Indicators -->
            <div class="indicators-section" id="indicatorsSection" style="display: none;">
                <div class="indicator-card">
                    <div class="indicator-title">RSI (14)</div>
                    <div class="indicator-value" id="rsiValue">--</div>
                    <div class="stat-label" id="rsiSignal">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">MACD</div>
                    <div class="indicator-value" id="macdValue">--</div>
                    <div class="stat-label" id="macdSignal">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">MA20</div>
                    <div class="indicator-value" id="ma20Value">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">MA50</div>
                    <div class="indicator-value" id="ma50Value">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">Bollinger Upper</div>
                    <div class="indicator-value" id="bbUpper">--</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">Bollinger Lower</div>
                    <div class="indicator-value" id="bbLower">--</div>
                </div>
            </div>
        </div>
        
        <div class="error" id="error" style="display: none;"></div>
    </div>
    
    <script>
        // State
        let chart = null;
        let currentTicker = '';
        let currentTimeframe = '1D';
        let currentSector = 'all';
        let refreshInterval = null;
        let sectorData = [];
        
        const API_BASE = 'http://192.168.250.208:8888/api';
        
        // Tab Management
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
            
            if (tab === 'klci') {
                loadKLCIData();
            }
        }
        
        // KLCI Functions
        async function loadKLCIData() {
            await Promise.all([
                loadKLCIHeader(),
                loadSectorTabs(),
                loadKLCIQuotes()
            ]);
        }
        
        async function loadKLCIHeader() {
            try {
                const response = await fetch(`${API_BASE}/klci/index`);
                const data = await response.json();
                
                const container = document.getElementById('klciHeader');
                
                if (data.klci) {
                    const klci = data.klci;
                    const changeClass = klci.change_pct >= 0 ? 'positive' : 'negative';
                    const changeSymbol = klci.change_pct >= 0 ? '+' : '';
                    
                    container.innerHTML = `
                        <div class="klci-card main">
                            <div class="klci-label">🇲🇾 KLCI Index</div>
                            <div class="klci-value">${klci.value ? klci.value.toFixed(2) : '--'}</div>
                            <div class="klci-change ${changeClass}">
                                ${changeSymbol}${klci.change ? klci.change.toFixed(2) : '--'} (${changeSymbol}${klci.change_pct ? klci.change_pct.toFixed(2) : '--'}%)
                            </div>
                        </div>
                    `;
                    
                    // Add other indices
                    if (data.indices && data.indices.length > 1) {
                        for (const idx of data.indices.slice(1)) {
                            const idxClass = idx.change_pct >= 0 ? 'positive' : 'negative';
                            const idxSymbol = idx.change_pct >= 0 ? '+' : '';
                            container.innerHTML += `
                                <div class="klci-card">
                                    <div class="klci-label">${idx.name}</div>
                                    <div class="klci-value">${idx.price ? idx.price.toFixed(0) : '--'}</div>
                                    <div class="klci-change ${idxClass}">
                                        ${idxSymbol}${idx.change ? idx.change.toFixed(0) : '--'} (${idxSymbol}${idx.change_pct ? idx.change_pct.toFixed(2) : '--'}%)
                                    </div>
                                </div>
                            `;
                        }
                    }
                }
            } catch (e) {
                console.error('Error loading KLCI header:', e);
            }
        }
        
        async function loadSectorTabs() {
            try {
                const response = await fetch(`${API_BASE}/klci/sectors`);
                const sectors = await response.json();
                
                const container = document.getElementById('sectorTabs');
                container.innerHTML = '';
                
                for (const sector of sectors) {
                    const btn = document.createElement('button');
                    btn.className = 'sector-btn' + (sector.id === currentSector ? ' active' : '');
                    btn.onclick = () => selectSector(sector.id);
                    btn.innerHTML = `${sector.icon} ${sector.name} <span class="count" id="count-${sector.id}">--</span>`;
                    container.appendChild(btn);
                }
            } catch (e) {
                console.error('Error loading sectors:', e);
            }
        }
        
        async function loadKLCIQuotes() {
            try {
                const response = await fetch(`${API_BASE}/klci/quote?sector=${currentSector}`);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                sectorData = data.quotes || [];
                const sectorSummary = data.sector_summary || {};
                
                // Update sector counts
                document.querySelectorAll('.sector-btn').forEach(btn => {
                    const sectorId = btn.onclick.toString().match(/selectSector\('([^']+)'\)/)?.[1];
                    if (sectorId && sectorSummary[sectorId]) {
                        const count = sectorSummary[sectorId].total;
                        const countEl = document.getElementById(`count-${sectorId}`);
                        if (countEl) countEl.textContent = count;
                        
                        // Update button color based on sector trend
                        const avgChange = sectorSummary[sectorId].avg_change;
                        btn.classList.toggle('up', avgChange > 0);
                        btn.classList.toggle('down', avgChange < 0);
                    }
                });
                
                // Update all count
                const totalCount = sectorData.length;
                const allCountEl = document.getElementById('count-all');
                if (allCountEl) allCountEl.textContent = totalCount;
                
                // Render sector summary pills
                renderSectorSummary(sectorSummary);
                
                // Render table
                renderStockTable();
                
            } catch (e) {
                console.error('Error loading KLCI quotes:', e);
                showError('Error loading stock data: ' + e.message);
            }
        }
        
        function renderSectorSummary(summary) {
            const container = document.getElementById('sectorSummary');
            container.innerHTML = '';
            
            const sectorIcons = {
                'Financials': '🏦',
                'Energy': '⚡',
                'Utilities': '🔌',
                'Telecommunications': '📱',
                'Consumer': '🛒',
                'Industrial': '🏭',
                'Real Estate': '🏠',
                'Plantation': '🌴',
                'Technology': '💻',
                'Healthcare': '🏥'
            };
            
            for (const [sector, data] of Object.entries(summary)) {
                const pill = document.createElement('div');
                const changeClass = data.avg_change >= 0 ? 'up' : 'down';
                const changeSymbol = data.avg_change >= 0 ? '+' : '';
                pill.className = `sector-pill ${changeClass}`;
                pill.innerHTML = `
                    <span class="icon">${sectorIcons[sector] || '📊'}</span>
                    <span class="name">${sector}</span>
                    <span class="change">${changeSymbol}${data.avg_change.toFixed(2)}%</span>
                    <span style="color: #666; font-size: 11px;">(${data.up}↑ ${data.down}↓)</span>
                `;
                pill.onclick = () => selectSector(sector);
                pill.style.cursor = 'pointer';
                container.appendChild(pill);
            }
        }
        
        function renderStockTable() {
            const tbody = document.getElementById('klciTableBody');
            tbody.innerHTML = '';
            
            if (sectorData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">No data available</td></tr>';
                return;
            }
            
            let currentSectorName = '';
            
            for (const stock of sectorData) {
                // Add sector header if sector changed
                if (currentSector === 'all' && stock.sector !== currentSectorName) {
                    currentSectorName = stock.sector;
                    const headerRow = document.createElement('tr');
                    headerRow.className = 'sector-header';
                    headerRow.innerHTML = `<td colspan="5">${stock.sector}</td>`;
                    tbody.appendChild(headerRow);
                }
                
                const row = document.createElement('tr');
                row.onclick = () => viewStock(stock.ticker);
                
                const changeClass = (stock.change_pct || 0) >= 0 ? 'positive' : 'negative';
                const changeSymbol = (stock.change_pct || 0) >= 0 ? '+' : '';
                
                // Calculate bar width (capped at 5%)
                const barWidth = Math.min(Math.abs(stock.change_pct || 0) * 10, 100);
                
                row.innerHTML = `
                    <td>
                        <div class="stock-name-cell">
                            <span class="stock-name">${stock.name}</span>
                            <span class="stock-ticker">${stock.ticker}</span>
                        </div>
                    </td>
                    <td class="price-cell">${stock.price ? 'RM ' + stock.price.toFixed(2) : '--'}</td>
                    <td class="change-cell ${changeClass}">
                        ${stock.change ? changeSymbol + stock.change.toFixed(2) : '--'}
                        <div class="change-bar">
                            <div class="change-bar-fill ${changeClass}" style="width: ${barWidth}%"></div>
                        </div>
                    </td>
                    <td class="change-cell ${changeClass}">${stock.change_pct ? changeSymbol + stock.change_pct.toFixed(2) + '%' : '--'}</td>
                    <td>${stock.volume ? formatNumber(stock.volume) : '--'}</td>
                `;
                
                tbody.appendChild(row);
            }
        }
        
        function selectSector(sector) {
            currentSector = sector;
            
            // Update button states
            document.querySelectorAll('.sector-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.onclick.toString().includes(`'${sector}'`)) {
                    btn.classList.add('active');
                }
            });
            
            loadKLCIQuotes();
        }
        
        function viewStock(ticker) {
            // Switch to stocks tab and load the stock
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('stocks-tab').classList.add('active');
            
            document.getElementById('stockSelect').value = ticker;
            loadStock();
        }
        
        // Stock Tab Functions
        async function init() {
            await loadStockList();
            await loadKLCIData();
            
            if (document.getElementById('autoRefresh').checked) {
                startAutoRefresh();
            }
            
            document.getElementById('autoRefresh').addEventListener('change', function() {
                if (this.checked) {
                    startAutoRefresh();
                } else {
                    stopAutoRefresh();
                }
            });
        }
        
        async function loadStockList() {
            try {
                const response = await fetch(`${API_BASE}/stocks`);
                const stocks = await response.json();
                
                const select = document.getElementById('stockSelect');
                for (const [name, ticker] of Object.entries(stocks)) {
                    const option = document.createElement('option');
                    option.value = ticker;
                    option.textContent = name;
                    select.appendChild(option);
                }
            } catch (e) {
                showError('Cannot connect to API. Make sure app.py is running.');
            }
        }
        
        function setTimeframe(tf) {
            currentTimeframe = tf;
            
            document.querySelectorAll('.timeframe-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tf === tf);
            });
            
            if (currentTicker) {
                loadStockData(currentTicker, tf);
            }
        }
        
        async function loadStock() {
            const ticker = document.getElementById('stockSelect').value;
            if (!ticker) return;
            
            currentTicker = ticker;
            await loadStockData(ticker, currentTimeframe);
        }
        
        async function loadStockData(ticker, timeframe) {
            try {
                const quoteRes = await fetch(`${API_BASE}/quote/${ticker}`);
                const quote = await quoteRes.json();
                
                if (quote.error) {
                    showError(quote.error);
                    return;
                }
                
                document.getElementById('priceCard').style.display = 'block';
                document.getElementById('chartContainer').style.display = 'block';
                document.getElementById('indicatorsSection').style.display = 'grid';
                hideError();
                
                document.getElementById('stockName').textContent = quote.name || ticker;
                document.getElementById('currentPrice').textContent = 'RM ' + (quote.price ? quote.price.toFixed(2) : '--');
                
                const changeEl = document.getElementById('priceChange');
                const change = quote.change_pct || 0;
                changeEl.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
                changeEl.className = `price-change ${change >= 0 ? 'positive' : 'negative'}`;
                
                document.getElementById('prevClose').textContent = quote.prev_close ? 'RM ' + quote.prev_close.toFixed(2) : '--';
                document.getElementById('dayHigh').textContent = quote.day_high ? 'RM ' + quote.day_high.toFixed(2) : '--';
                document.getElementById('dayLow').textContent = quote.day_low ? 'RM ' + quote.day_low.toFixed(2) : '--';
                document.getElementById('week52High').textContent = quote.week52_high ? 'RM ' + quote.week52_high.toFixed(2) : '--';
                document.getElementById('week52Low').textContent = quote.week52_low ? 'RM ' + quote.week52_low.toFixed(2) : '--';
                document.getElementById('volume').textContent = quote.volume ? formatNumber(quote.volume) : '--';
                
                await loadChart(ticker, timeframe);
                await loadTechnicals(ticker);
                
            } catch (e) {
                showError('Error loading stock data: ' + e.message);
            }
        }
        
        async function loadChart(ticker, timeframe) {
            const intervalMap = {
                '1D': '5m',
                '1W': '15m',
                '1MO': '1d',
                '3MO': '1d',
                '6MO': '1d',
                '1Y': '1wk',
                '5Y': '1mo'
            };
            
            const interval = intervalMap[timeframe] || '1d';
            
            try {
                const response = await fetch(`${API_BASE}/history/${ticker}?period=${timeframe}&interval=${interval}`);
                const data = await response.json();
                
                if (data.error || !data.data) {
                    showError(data.error || 'No chart data available');
                    return;
                }
                
                const chartData = data.data.map(d => ({
                    time: d.time,
                    open: d.open,
                    high: d.high,
                    low: d.low,
                    close: d.close
                }));
                
                renderChart(chartData);
                
            } catch (e) {
                showError('Error loading chart: ' + e.message);
            }
        }
        
        function renderChart(data) {
            const container = document.getElementById('chart');
            container.innerHTML = '';
            
            if (chart) {
                chart.remove();
            }
            
            chart = LightweightCharts.createChart(container, {
                width: container.clientWidth,
                height: 400,
                layout: {
                    background: { type: 'solid', color: '#1a1a2e' },
                    textColor: '#d1d4dc'
                },
                grid: {
                    vertLines: { color: 'rgba(255,255,255,0.1)' },
                    horzLines: { color: 'rgba(255,255,255,0.1)' }
                },
                crosshair: {
                    mode: LightweightCharts.CrosshairMode.Normal
                },
                timeScale: {
                    borderColor: 'rgba(255,255,255,0.2)'
                },
                rightPriceScale: {
                    borderColor: 'rgba(255,255,255,0.2)'
                }
            });
            
            const candlestickSeries = chart.addCandlestickSeries({
                upColor: '#00ff88',
                downColor: '#ff4444',
                borderUpColor: '#00ff88',
                borderDownColor: '#ff4444',
                wickUpColor: '#00ff88',
                wickDownColor: '#ff4444'
            });
            
            candlestickSeries.setData(data);
            
            const volumeSeries = chart.addHistogramSeries({
                color: '#26a69a',
                priceFormat: { type: 'volume' },
                priceScaleId: 'volume'
            });
            
            chart.priceScale('volume').applyOptions({
                scaleMargins: { top: 0.8, bottom: 0 }
            });
            
            volumeSeries.setData(data.map(d => ({
                time: d.time,
                value: d.volume,
                color: d.close >= d.open ? 'rgba(0,255,136,0.5)' : 'rgba(255,68,68,0.5)'
            })));
            
            window.addEventListener('resize', () => {
                chart.applyOptions({ width: container.clientWidth });
            });
        }
        
        async function loadTechnicals(ticker) {
            try {
                const response = await fetch(`${API_BASE}/technicals/${ticker}`);
                const data = await response.json();
                
                if (data.error || !data.latest) return;
                
                const latest = data.latest;
                
                const rsiEl = document.getElementById('rsiValue');
                rsiEl.textContent = latest.rsi ? latest.rsi.toFixed(2) : '--';
                rsiEl.className = 'indicator-value ' + getRSIClass(latest.rsi);
                document.getElementById('rsiSignal').textContent = getRSISignal(latest.rsi);
                
                const macdEl = document.getElementById('macdValue');
                macdEl.textContent = latest.macd ? latest.macd.toFixed(4) : '--';
                macdEl.className = 'indicator-value ' + (latest.macd > 0 ? 'positive' : 'negative');
                document.getElementById('macdSignal').textContent = latest.macd > latest.macd_signal ? '🐂 Bullish' : '🐻 Bearish';
                
                document.getElementById('ma20Value').textContent = latest.ma20 ? 'RM ' + latest.ma20.toFixed(2) : '--';
                document.getElementById('ma50Value').textContent = latest.ma50 ? 'RM ' + latest.ma50.toFixed(2) : '--';
                document.getElementById('bbUpper').textContent = latest.bb_upper ? 'RM ' + latest.bb_upper.toFixed(2) : '--';
                document.getElementById('bbLower').textContent = latest.bb_lower ? 'RM ' + latest.bb_lower.toFixed(2) : '--';
                
            } catch (e) {
                console.error('Error loading technicals:', e);
            }
        }
        
        function getRSIClass(rsi) {
            if (!rsi) return 'neutral';
            if (rsi > 70) return 'negative';
            if (rsi < 30) return 'positive';
            return 'neutral';
        }
        
        function getRSISignal(rsi) {
            if (!rsi) return '--';
            if (rsi > 70) return '⚠️ Overbought';
            if (rsi < 30) return '🟢 Oversold';
            return '📊 Neutral';
        }
        
        function formatNumber(num) {
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return num.toString();
        }
        
        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('error').style.display = 'none';
        }
        
        function startAutoRefresh() {
            stopAutoRefresh();
            refreshInterval = setInterval(async () => {
                await loadKLCIData();
                if (currentTicker) {
                    await loadStockData(currentTicker, currentTimeframe);
                }
            }, 30000);
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
        
        async function refreshAll() {
            await loadKLCIData();
            if (currentTicker) {
                await loadStockData(currentTicker, currentTimeframe);
            }
        }
        
        // Start
        init();
    </script>
</body>
</html>
